<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>word list</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>word list</h1>
      </header>

      <form class="word-form" id="word-form">
        <label class="sr-only" for="word-input">単語</label>
        <input id="word-input" type="text" maxlength="80" placeholder="分からない単語" autocomplete="off" />

        <label class="sr-only" for="note-input">メモ</label>
        <input id="note-input" type="text" maxlength="240" placeholder="意味を調べたらメモ" autocomplete="off" />

        <label class="sr-only" for="tag-input">タグ</label>
        <input id="tag-input" type="text" maxlength="120" placeholder="タグ（カンマ区切り）" autocomplete="off" />

        <button type="submit">追加</button>
      </form>

      <section class="toolbar" aria-label="表示設定">
        <label class="filter-field">
          <span>タグ</span>
          <select id="tag-filter">
            <option value="all">すべて</option>
          </select>
        </label>
        <button id="start-test" type="button">テスト</button>
      </section>

      <section class="word-section" aria-label="単語一覧">
        <div class="table-head" aria-hidden="true">
          <span>単語</span>
          <span>メモ</span>
          <span>タグ</span>
          <span title="同じ単語を追加した回数">✔</span>
        </div>
        <ul class="word-list" id="word-list"></ul>
        <p class="empty-state" id="empty-state">分からなかった単語を追加してください。</p>
      </section>
    </main>

    <dialog class="test-dialog" id="test-dialog">
      <form method="dialog" class="test-shell">
        <header class="test-header">
          <span id="test-progress">0 / 0</span>
          <button type="submit" aria-label="閉じる">閉じる</button>
        </header>
        <div class="test-card">
          <p class="test-word" id="test-word"></p>
          <p class="test-note" id="test-note" hidden></p>
        </div>
        <div class="test-actions">
          <button id="reveal-note" type="button">意味を見る</button>
          <button id="next-word" type="button">次へ</button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
