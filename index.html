<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="分からなかった単語をタグ付きで素早く保存するアプリ。フラッシュカードで復習もできます。" />
    <meta property="og:title" content="word list" />
    <meta property="og:description" content="分からなかった単語をタグ付きで素早く保存するアプリ。フラッシュカードで復習もできます。" />
    <meta property="og:url" content="https://junkoma2.github.io/word-list/" />
    <meta property="og:type" content="website" />
    <title>word list</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#10B981" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>word list</h1>
        <div class="app-menu">
          <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-popup" aria-label="メニューを開く">⋯</button>
          <div id="menu-popup" class="menu-popup" hidden>
            <button id="check-update" class="menu-item" type="button">更新を確認</button>
            <button id="export-data" class="menu-item" type="button">エクスポート</button>
            <button id="import-data" class="menu-item" type="button">インポート</button>
          </div>
          <input id="import-file" class="sr-only" type="file" accept="application/json" />
        </div>
      </header>

      <form class="word-form" id="word-form">
        <div class="form-field">
          <label for="word-input">単語</label>
          <input id="word-input" type="text" maxlength="80" placeholder="分からなかった単語" autocomplete="off" />
          <p id="word-error" class="field-error" role="alert" hidden>単語を入力してください</p>
        </div>

        <div class="form-field">
          <label for="note-input">メモ</label>
          <input id="note-input" type="text" maxlength="240" placeholder="意味・使い方など" autocomplete="off" />
        </div>

        <div class="form-field">
          <label for="tag-input">タグ</label>
          <div class="tag-composer" id="tag-composer">
            <div class="tag-chip-list" id="tag-chip-list"></div>
            <input id="tag-input" type="text" maxlength="40" placeholder="タグ名を入力" autocomplete="off" list="tag-suggestions" />
            <datalist id="tag-suggestions"></datalist>
            <button class="tag-add-button" id="tag-add-button" type="button">タグを追加</button>
          </div>
        </div>

        <div class="form-submit-row">
          <button type="submit" id="submit-button">単語を追加</button>
          <button type="button" id="cancel-edit-button" hidden>キャンセル</button>
        </div>
      </form>

      <section class="toolbar" aria-label="表示設定">
        <label class="filter-field">
          <span>タグで絞り込む</span>
          <select id="tag-filter">
            <option value="all">すべて</option>
          </select>
        </label>
        <label class="search-field">
          <span class="sr-only">単語・メモを検索</span>
          <input id="search-input" type="search" placeholder="検索..." autocomplete="off" />
        </label>
        <div class="test-control">
          <button id="start-test" type="button">テストを始める</button>
          <span class="test-hint" id="test-hint">単語を追加するとテストできます</span>
        </div>
      </section>

      <section class="word-section" aria-label="単語一覧">
        <div class="table-head" aria-hidden="true">
          <span>単語</span>
          <span>メモ</span>
          <span>タグ</span>
          <span title="同じ単語を追加した回数">回数</span>
        </div>
        <ul class="word-list" id="word-list"></ul>
        <p class="empty-state" id="empty-state">分からなかった単語を追加してください。</p>
      </section>
      <p class="app-version">バージョン <span data-app-version></span></p>
    </main>

    <dialog class="test-dialog" id="test-dialog">
      <form method="dialog" class="test-shell">
        <header class="test-header">
          <span id="test-progress">0 / 0</span>
          <button type="submit" aria-label="閉じる">閉じる</button>
        </header>
        <div class="test-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="test-progress-fill" id="test-progress-fill"></div>
        </div>
        <div class="test-card">
          <p class="test-word" id="test-word"></p>
          <p class="test-note" id="test-note" hidden></p>
        </div>
        <div class="test-actions">
          <button id="reveal-note" type="button">意味を見る</button>
          <button id="next-word" type="button">次へ</button>
        </div>
      </form>
    </dialog>


    <dialog class="confirm-dialog" id="confirm-dialog" aria-modal="true">
      <div class="confirm-dialog-inner">
        <p class="confirm-dialog-message" id="confirm-dialog-message"></p>
        <div class="confirm-dialog-actions">
          <button id="confirm-dialog-ok" type="button">はい</button>
          <button id="confirm-dialog-cancel" type="button">キャンセル</button>
        </div>
      </div>
    </dialog>

    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    <script src="./version.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
